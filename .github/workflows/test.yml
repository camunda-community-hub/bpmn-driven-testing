name: Test
on:
  push:
    branches:
      - '**'
      - '!master'
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java environment
        uses: actions/setup-java@v1
        with:
          java-version: 17
      - name: Run tests via Maven
        run: mvn --batch-mode clean test
